name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Instala dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Testes (unitários, sem rede)
        run: pytest -q
